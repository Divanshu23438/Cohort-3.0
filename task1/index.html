<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <main class="dashboard">
            <!-- Header -->
            <header class="header">
                <button class="icon-btn">Menu</button>
                <img src="International_Pokémon_logo.svg.png" alt="Pokémon Logo" class="main-logo">
                <button class="icon-btn">Light</button>
            </header>

            <!-- Search -->
            <section class="controls">
                <div class="search-wrapper">
                    <input type="text" placeholder="Search for a Pokémon..." class="search-input">
                </div>
                <button class="filter-btn">Filter</button>
            </section>

            <!-- Pokemon Grid -->
            <section class="pokemon-grid">
                <!-- Meowscarada -->
                <div class="pokemon-card">
                    <div class="card-header">
                        <span class="pokemon-id">#0908</span>
                        <span>Heart</span>
                    </div>
                    <div class="pokemon-image-container">
                        <img src="Meowscarada.png" alt="Meowscarada" class="pokemon-img">
                    </div>
                    <div class="card-body">
                        <h2>Meowscarada</h2>
                        <div class="footer-actions">
                            <span class="type-label grass-bg">GRASS</span>
                            <button class="next-btn">Next</button>
                        </div>
                    </div>
                </div>

                <!-- Pawniard -->
                <div class="pokemon-card">
                    <div class="card-header">
                        <span class="pokemon-id">#0624</span>
                        <span>Heart</span>
                    </div>
                    <div class="pokemon-image-container">
                        <img src="Pawniard.png" alt="Pawniard" class="pokemon-img">
                    </div>
                    <div class="card-body">
                        <h2>Pawniard</h2>
                        <div class="footer-actions">
                            <span class="type-label dark-bg">DARK / STEEL</span>
                            <button class="next-btn">Next</button>
                        </div>
                    </div>
                </div>

                <!-- Houndoom -->
                <div class="pokemon-card">
                    <div class="card-header">
                        <span class="pokemon-id">#0229</span>
                        <span>Heart</span>
                    </div>
                    <div class="pokemon-image-container">
                        <img src="Houndoom.png" alt="Houndoom" class="pokemon-img">
                    </div>
                    <div class="card-body">
                        <h2>Houndoom</h2>
                        <div class="footer-actions">
                            <span class="type-label fire-bg">DARK / FIRE</span>
                            <button class="next-btn">Next</button>
                        </div>
                    </div>
                </div>

                <!-- Inkay -->
                <div class="pokemon-card">
                    <div class="card-header">
                        <span class="pokemon-id">#0686</span>
                        <span>Heart</span>
                    </div>
                    <div class="pokemon-image-container">
                        <img src="Inkay.png" alt="Inkay" class="pokemon-img">
                    </div>
                    <div class="card-body">
                        <h2>Inkay</h2>
                        <div class="footer-actions">
                            <span class="type-label psychic-bg">DARK / PSYCHIC</span>
                            <button class="next-btn">Next</button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Bottom Nav -->
            <nav class="quick-nav">
                <div class="nav-item">
                    <div class="nav-icon-wrapper blue">E</div>
                    <div class="nav-text">
                        <h3>Explore</h3>
                        <p>Discover Pokémon</p>
                    </div>
                </div>
                <div class="nav-item">
                    <div class="nav-icon-wrapper green">F</div>
                    <div class="nav-text">
                        <h3>Filter</h3>
                        <p>Find by types</p>
                    </div>
                </div>
                <div class="nav-item">
                    <div class="nav-icon-wrapper yellow">C</div>
                    <div class="nav-text">
                        <h3>Collection</h3>
                        <p>Your collection</p>
                    </div>
                </div>
                <div class="nav-item">
                    <div class="nav-icon-wrapper purple">S</div>
                    <div class="nav-text">
                        <h3>Stats</h3>
                        <p>View stats</p>
                    </div>
                </div>
            </nav>

            <!-- Footer -->
            <footer class="footer">
                <p>&copy; 2024 Pokémon. All rights reserved.</p>
            </footer>
        </main>
    </div>
</body>
</html>
